{% extends 'layout.html' %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-container">
    <!-- Center Icon -->
    <div class="shield-icon-wrapper">
      <i class="fas fa-shield-halved fa-2x" style="color: #2563eb;"></i>
      <div class="status-dot-auth"></div>
    </div>

    <!-- Title Section -->
    <div class="text-center">
      <h1 class="auth-title">SECURE PROCESSOR</h1>
      <p class="auth-subtitle">TRUSTED COMPUTING SYSTEM v1.0</p>
    </div>

    <!-- Login/Register Toggle -->
    <div class="auth-toggle-pill">
      <a href="{{ url_for('login') }}" class="auth-toggle-btn {% if not register %}active{% endif %}">LOGIN</a>
      <a href="{{ url_for('register') }}" class="auth-toggle-btn {% if register %}active{% endif %}">REGISTER</a>
    </div>

    <!-- Error Alerts -->
    {% if error %}
    <div class="error-alert">
      <i class="fas fa-triangle-exclamation"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Auth Form -->
    <form method="POST" action="{% if register %}{{ url_for('register') }}{% else %}{{ url_for('login') }}{% endif %}">

      {% if register %}
      <div class="mb-4">
        <label class="field-label d-block mb-2">Display Name</label>
        <input class="custom-input mono" name="display_name" placeholder="Enter display name" required>
      </div>
      {% endif %}

      <div class="mb-3">
        <label class="field-label d-block mb-1">User Identifier</label>
        <input class="custom-input mono" name="username" placeholder="user@domain.com" required value="">
      </div>

      <div class="mb-3">
        <label class="field-label d-block mb-1">Access Key</label>
        <input class="custom-input mono" name="password" type="password" id="password-field" placeholder="••••••••"
          required>
      </div>

      <button type="submit" class="btn-primary-custom" style="margin-bottom: 20px; margin-top: 10px;">
        {% if register %}Create Account{% else %}Authenticate{% endif %}
      </button>
    </form>

    <!-- Footer -->
    <div class="d-flex justify-content-center align-items-center gap-2 text-secondary"
      style="font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.6;">
      <i class="fas fa-lock" style="font-size: 11px;"></i>
      <span>AES-256 ENCRYPTED · ROLE-BASED ACCESS CONTROL</span>
    </div>
  </div>
</div>
{% endblock %}
